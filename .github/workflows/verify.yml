# Tanomude CI — runs on every PR to main.
# The secret scan and the mock-as400 test suite must pass before the human merge gate.
# Required status check = job `verify` (extends, never a separate ci.yml — design section 23).

name: ci

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # actions/checkout
      pull-requests: read   # gitleaks reads PR commits (403 without this)
    services:
      postgres:
        # Ephemeral service container — exists only for this run.
        # Throwaway credentials per the standard GitHub Actions service pattern; not a real secret.
        image: postgres:16
        env:
          POSTGRES_USER: tanomude
          POSTGRES_PASSWORD: tanomude
          POSTGRES_DB: mock_as400
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tanomude -d mock_as400"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      platform-db:
        # Platform RAG store (design §10) — pgvector, separate from the Mock DB.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tanomude
          POSTGRES_PASSWORD: tanomude
          POSTGRES_DB: platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U tanomude -d platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, required for secret scanning

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required for gitleaks-action to scan pull requests (v2 breaking change).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Free for personal-account repositories. A GITLEAKS_LICENSE secret is
        # only required for organization-owned repos.

      - name: Secret scan (trufflehog)
        run: >-
          docker run --rm -v "${{ github.workspace }}:/repo" trufflesecurity/trufflehog:3.95.2
          filesystem /repo/mock-as400 /repo/adapter /repo/backend /repo/.github
          /repo/docker-compose.yml /repo/.env.example
          --no-update --fail --results=verified,unknown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint (ruff)
        run: pipx run --spec ruff==0.15.15 ruff check .

      - name: Install mock-as400
        working-directory: mock-as400
        run: pip install -e ".[dev]"

      - name: Run mock-as400 tests
        working-directory: mock-as400
        env:
          # Host is the mapped service-container port on the runner; same URL format as .env.example.
          DATABASE_URL: postgresql+psycopg://tanomude:tanomude@localhost:5432/mock_as400
        run: pytest -q

      - name: Install adapter
        working-directory: adapter
        run: pip install -e ".[dev]"

      - name: Run adapter tests
        working-directory: adapter
        env:
          DATABASE_URL: postgresql+psycopg://tanomude:tanomude@localhost:5432/mock_as400
        run: pytest -q

      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run backend tests
        working-directory: backend
        env:
          PLATFORM_DATABASE_URL: postgresql+psycopg://tanomude:tanomude@localhost:5433/platform
          # No embedding service in CI: TEI-dependent tests (ingest/embed/eval) skip; fake-embedder tests gate.
          EMBEDDING_URL: http://localhost:8001
        run: pytest -q
