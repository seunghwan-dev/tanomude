<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" role="img" aria-label="Architecture: an instruction is planned over RAG grounding and personal corrections, gated by human approval, executed through a screen adapter against the mock AS-400, verified against the screen, and measured by an eval harness">
      <defs>
        <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
          <path d="M0,0 L9,4.5 L0,9 Z" fill="#8A8479"/>
        </marker>
        <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
          <path d="M0,0 L9,4.5 L0,9 Z" fill="#1C7A45"/>
        </marker>
        <marker id="aha" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
          <path d="M0,0 L9,4.5 L0,9 Z" fill="#B45309"/>
        </marker>
      </defs>
      <g font-family="'Inter','Noto Sans JP',sans-serif">
        <g>
          <rect x="16" y="58" width="118" height="78" rx="10" fill="#FBFAF6" stroke="#D9D2C3" stroke-width="1.4"/>
          <text x="75" y="92" text-anchor="middle" font-weight="700" font-size="16" fill="#1C1A17">Instruction</text>
          <text x="75" y="114" text-anchor="middle" font-size="10.5" fill="#4A463F">natural language</text>
          </g>
        <g>
          <rect x="170" y="50" width="160" height="94" rx="10" fill="#FBFAF6" stroke="#D9D2C3" stroke-width="1.4"/>
          <text x="250" y="80" text-anchor="middle" font-weight="700" font-size="16" fill="#1C1A17">Plan</text>
          <text x="250" y="102" text-anchor="middle" font-size="10.5" fill="#4A463F">slot extraction</text>
          <text x="250" y="120" text-anchor="middle" font-size="10.5" fill="#4A463F">structured output + retry</text>
          </g>
        <g>
          <rect x="366" y="44" width="172" height="106" rx="10" fill="#E4EDE0" stroke="#1C7A45" stroke-width="2.2"/>
          <text x="452" y="76" text-anchor="middle" font-weight="700" font-size="16" fill="#194D30">Approval gate</text>
          <text x="452" y="98" text-anchor="middle" font-size="10.5" fill="#1C7A45">human approval</text>
          <text x="452" y="118" text-anchor="middle" font-size="10.5" fill="#1C7A45">Approve / Revise / Reject</text>
          <text x="452" y="136" text-anchor="middle" font-size="9.5" fill="#4A463F">the only path to execution</text>
          </g>
        <g>
          <rect x="574" y="50" width="160" height="94" rx="10" fill="#FBFAF6" stroke="#D9D2C3" stroke-width="1.4"/>
          <text x="654" y="80" text-anchor="middle" font-weight="700" font-size="16" fill="#1C1A17">Execute</text>
          <text x="654" y="102" text-anchor="middle" font-size="10.5" fill="#4A463F">key by key, idempotent</text>
          <text x="654" y="120" text-anchor="middle" font-size="10.5" fill="#4A463F">via a screen adapter</text>
          </g>
        <g>
          <rect x="770" y="50" width="154" height="94" rx="10" fill="#FBFAF6" stroke="#D9D2C3" stroke-width="1.4"/>
          <text x="847" y="80" text-anchor="middle" font-weight="700" font-size="16" fill="#1C1A17">Verify</text>
          <text x="847" y="102" text-anchor="middle" font-size="10.5" fill="#4A463F">assert screen state</text>
          <text x="847" y="120" text-anchor="middle" font-size="10.5" fill="#4A463F">after every action</text>
          </g>
        <g fill="none" stroke="#8A8479" stroke-width="1.6" marker-end="url(#ah)">
          <line x1="134" y1="97" x2="164" y2="97"/>
          <line x1="330" y1="97" x2="360" y2="97"/>
          <line x1="538" y1="97" x2="568" y2="97"/>
          <line x1="734" y1="97" x2="764" y2="97"/>
        </g>
        <g>
          <rect x="770" y="196" width="154" height="140" rx="10" fill="#FBFAF6" stroke="#D9D2C3" stroke-width="1.4"/>
          <text x="847" y="222" text-anchor="middle" font-weight="700" font-size="13" fill="#1C1A17">outcome</text>
          <text x="847" y="244" text-anchor="middle" font-size="11" fill="#1C7A45">Submitted</text>
          <text x="847" y="264" text-anchor="middle" font-size="11" fill="#B45309">Re-entry / code check</text>
          <text x="847" y="284" text-anchor="middle" font-size="11" fill="#4A463F">Needs investigation</text>
          <line x1="784" y1="296" x2="910" y2="296" stroke="#D9D2C3" stroke-width="1"/>
          <text x="847" y="312" text-anchor="middle" font-size="9" fill="#4A463F">replan (≤2), then roll back</text>
          <text x="847" y="326" text-anchor="middle" font-size="9" fill="#B45309">bad data → a person, no retry</text>
          </g>
        <line x1="847" y1="144" x2="847" y2="190" fill="none" stroke="#8A8479" stroke-width="1.6" marker-end="url(#ah)"/>
        <path d="M788 150 C 730 186, 690 168, 672 152" fill="none" stroke="#8A8479" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ah)"/>
        <text x="728" y="196" text-anchor="middle" font-size="10" fill="#4A463F">replan</text>
        <line x1="654" y1="144" x2="654" y2="220" fill="none" stroke="#8A8479" stroke-width="1.5" marker-end="url(#ah)"/>
        <g>
          <rect x="16" y="226" width="164" height="90" rx="10" fill="#FBEEDC" stroke="#E7C9A0" stroke-width="1.4"/>
          <text x="98" y="254" text-anchor="middle" font-weight="700" font-size="13" fill="#92400E">Reject (pre-execution)</text>
          <text x="98" y="276" text-anchor="middle" font-size="9.5" fill="#92400E">out-of-domain / missing fields</text>
          <text x="98" y="294" text-anchor="middle" font-size="9.5" fill="#92400E">refused before the gate</text>
          </g>
        <path d="M190 144 C 160 175, 130 195, 105 220" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aha)"/>
        <g>
          <rect x="200" y="226" width="168" height="90" rx="10" fill="#ECE6D8" stroke="#D9D2C3" stroke-width="1.4"/>
          <text x="284" y="254" text-anchor="middle" font-weight="700" font-size="13" fill="#1C1A17">Manual RAG</text>
          <text x="284" y="276" text-anchor="middle" font-size="10" fill="#4A463F">hybrid retrieval</text>
          <text x="284" y="294" text-anchor="middle" font-size="10" fill="#4A463F">vector + full-text, rank-fused</text>
          </g>
        <g>
          <rect x="388" y="226" width="160" height="90" rx="10" fill="#ECE6D8" stroke="#D9D2C3" stroke-width="1.4"/>
          <text x="468" y="254" text-anchor="middle" font-weight="700" font-size="13" fill="#1C1A17">Personal correction (growth)</text>
          <text x="468" y="276" text-anchor="middle" font-size="10" fill="#4A463F">per-operator corrections</text>
          <text x="468" y="294" text-anchor="middle" font-size="10" fill="#4A463F">reshape the next plan</text>
          </g>
        <g>
          <rect x="574" y="226" width="176" height="90" rx="10" fill="#EAF2E6" stroke="#9BCBA4" stroke-width="1.4"/>
          <text x="662" y="254" text-anchor="middle" font-weight="700" font-size="13" fill="#194D30">Mock AS-400</text>
          <text x="662" y="276" text-anchor="middle" font-size="9.5" fill="#1C7A45">a deterministic screen state machine</text>
          <text x="662" y="294" text-anchor="middle" font-size="9.5" fill="#1C7A45">the same seam as a real 5250</text>
          </g>
        <g fill="none" stroke="#8A8479" stroke-width="1.5" marker-end="url(#ah)">
          <path d="M284 226 C 268 196, 252 172, 240 152"/>
          <path d="M430 226 C 378 196, 330 176, 302 154"/>
        </g>
        <path d="M452 150 C 462 178, 472 200, 480 220" fill="none" stroke="#1C7A45" stroke-width="1.6" marker-end="url(#ahg)"/>
        <text x="468" y="338" text-anchor="middle" font-size="10" fill="#1C7A45">a reject / revise note persists as a personal correction</text>
        <text x="468" y="354" text-anchor="middle" font-size="10" fill="#4A463F">grounded slots are correction-immune, enforced in code</text>
        <g>
          <rect x="60" y="390" width="864" height="66" rx="10" fill="none" stroke="#8A8479" stroke-width="1.4" stroke-dasharray="6 5"/>
          <text x="492" y="416" text-anchor="middle" font-weight="700" font-size="13" fill="#1C1A17">Eval harness</text>
          <text x="492" y="438" text-anchor="middle" font-size="10.5" fill="#4A463F">scores planning · retrieval · recovery · growth Δ · boundary respect — runs locally with the model; CI gates a deterministic subset</text>
          </g>
      </g>
    </svg>
